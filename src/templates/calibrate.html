<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ground Homography Calibration - {{ camera_id }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f19;
      --panel: #131b2e;
      --accent: #00d2ff;
      --accent-green: #00e676;
      --text: #e2e8f0;
      --border: #1e293b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 900px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; color: #fff; }
    .btn-back {
      background: #1e2d5e;
      color: #8899bb;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .btn-back:hover { color: #fff; background: var(--accent); }

    .instructions {
      background: rgba(0, 210, 255, 0.08);
      border-left: 4px solid var(--accent);
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .canvas-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    canvas {
      cursor: crosshair;
      max-width: 100%;
      height: auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
    }
    .preset-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    select {
      background: #080c14;
      color: #fff;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .btn-group { display: flex; gap: 10px; }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btnReset { background: #1e293b; color: #94a3b8; }
    #btnReset:hover { background: #e53935; color: #fff; }
    #btnSave { background: var(--accent); color: #000; }
    #btnSave:hover { opacity: 0.9; transform: translateY(-1px); }

    #status {
      font-size: 0.85rem;
      font-weight: 600;
      min-height: 24px;
    }
    .ok { color: var(--accent-green); }
    .err { color: #ef5350; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📐 4-Point Ground Calibration: {{ camera_id }}</h1>
      <a href="/" class="btn-back">← Back to Dashboard</a>
    </div>

    <div class="instructions">
      Click <strong>4 points on the floor</strong> in order:
      <br />
      <strong>1. Top-Left → 2. Top-Right → 3. Bottom-Right → 4. Bottom-Left</strong>
    </div>

    <div class="canvas-wrapper">
      <canvas id="calCanvas"></canvas>
    </div>

    <div class="controls">
      <div class="preset-group">
        <label for="preset">Floor Plan Target Region:</label>
        <select id="preset">
          <option value="full">Full Floor Space (0.0 → 1.0)</option>
          <option value="zone_a">Zone A (Top-Left Quadrant)</option>
          <option value="zone_b">Zone B (Top-Right Quadrant)</option>
          <option value="zone_c">Zone C (Bottom-Left Quadrant)</option>
          <option value="zone_d">Zone D (Bottom-Right Quadrant)</option>
        </select>
      </div>

      <div class="btn-group">
        <button id="btnReset">Reset Points</button>
        <button id="btnSave">Save Calibration</button>
      </div>
    </div>

    <div id="status">Click 4 floor points on the camera image above to begin.</div>
  </div>

  <script>
    const camId = "{{ camera_id }}";
    const canvas = document.getElementById('calCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const btnReset = document.getElementById('btnReset');
    const btnSave  = document.getElementById('btnSave');
    const presetEl = document.getElementById('preset');

    let img = new Image();
    let points = []; // [[x,y], ...] in image natural pixels

    const PRESETS = {
      full:   [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]],
      zone_a: [[0.0, 0.0], [0.5, 0.0], [0.5, 0.5], [0.0, 0.5]],
      zone_b: [[0.5, 0.0], [1.0, 0.0], [1.0, 0.5], [0.5, 0.5]],
      zone_c: [[0.0, 0.5], [0.5, 0.5], [0.5, 1.0], [0.0, 1.0]],
      zone_d: [[0.5, 0.5], [1.0, 0.5], [1.0, 1.0], [0.5, 1.0]]
    };

    img.onload = () => {
      canvas.width = img.naturalWidth || 640;
      canvas.height = img.naturalHeight || 480;
      redraw();
      loadExisting();
    };
    img.src = `/api/camera_snapshot/${camId}`;

    function redraw() {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      if (points.length > 0) {
        // Draw polygon lines
        ctx.strokeStyle = '#00d2ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i][0], points[i][1]);
        }
        if (points.length === 4) {
          ctx.closePath();
          ctx.fillStyle = 'rgba(0, 210, 255, 0.15)';
          ctx.fill();
        }
        ctx.stroke();

        // Draw point markers
        points.forEach((pt, i) => {
          ctx.fillStyle = '#ff1744';
          ctx.beginPath();
          ctx.arc(pt[0], pt[1], 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 14px Inter';
          ctx.fillText(`P${i+1}`, pt[0] + 10, pt[1] - 5);
        });
      }
    }

    canvas.addEventListener('click', (e) => {
      if (points.length >= 4) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      const px = Math.round((e.clientX - rect.left) * scaleX);
      const py = Math.round((e.clientY - rect.top) * scaleY);

      points.push([px, py]);
      redraw();

      if (points.length < 4) {
        statusEl.innerHTML = `Point P${points.length} set. Click Point P${points.length + 1}...`;
      } else {
        statusEl.innerHTML = '<span class="ok">✓ 4 Points selected! Choose target region and tap "Save Calibration".</span>';
      }
    });

    btnReset.addEventListener('click', () => {
      points = [];
      redraw();
      statusEl.innerHTML = 'Points reset. Click 4 floor points on the image.';
    });

    async function loadExisting() {
      try {
        const res = await fetch(`/api/calibration_status/${camId}`);
        const data = await res.json();
        if (data.is_calibrated && data.data.src_points) {
          points = data.data.src_points;
          redraw();
          statusEl.innerHTML = '<span class="ok">✓ Active calibration loaded. Click "Reset Points" to re-calibrate.</span>';
        }
      } catch (e) {}
    }

    btnSave.addEventListener('click', async () => {
      if (points.length !== 4) {
        statusEl.innerHTML = '<span class="err">✗ Please click exactly 4 points on the floor first.</span>';
        return;
      }

      const dstPoints = PRESETS[presetEl.value] || PRESETS.full;

      try {
        const res = await fetch('/api/calibrate_camera', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            camera_id: camId,
            src_points: points,
            dst_points: dstPoints
          })
        });
        const resp = await res.json();
        if (resp.success) {
          statusEl.innerHTML = '<span class="ok">✓ Calibration saved successfully! Redirecting...</span>';
          setTimeout(() => window.location.href = '/', 1200);
        } else {
          statusEl.innerHTML = '<span class="err">✗ Failed to compute homography matrix. Try resetting points.</span>';
        }
      } catch (e) {
        statusEl.innerHTML = `<span class="err">✗ Error: ${e.message}</span>`;
      }
    });
  </script>
</body>
</html>
