name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        # Lightweight subset: the AI-model tests self-skip when weights are
        # unavailable, so CI stays fast and offline-safe. Full inference deps
        # (torch, ultralytics) are installed in the Docker image instead.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy opencv-python-headless fastapi \
            "pydantic-settings>=2" "sqlalchemy[asyncio]" asyncpg httpx \
            pytest pytest-asyncio ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app || true

      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t crowdvision-backend:ci .
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t crowdvision-frontend:ci .
