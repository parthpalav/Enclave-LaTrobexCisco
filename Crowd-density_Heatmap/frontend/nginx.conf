# Nginx config for serving the built frontend and proxying API/WebSocket
# traffic to the backend container (see docker/Dockerfile.frontend).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — always fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST + WebSocket to the backend service.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;   # important for MJPEG / streaming responses
    }
}
