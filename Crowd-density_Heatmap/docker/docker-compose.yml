# CrowdVision Heatmap Engine — full stack (backend + frontend + Postgres + Redis)
# Run from the repo root:  docker compose -f docker/docker-compose.yml up --build
name: crowdvision

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crowdvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crowdvision}
      POSTGRES_DB: ${POSTGRES_DB:-crowdvision}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crowdvision}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crowdvision}:${POSTGRES_PASSWORD:-crowdvision}@postgres:5432/${POSTGRES_DB:-crowdvision}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      YOLO_DEVICE: ${YOLO_DEVICE:-auto}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Persist downloaded model weights between runs.
      - models:/tmp/Ultralytics
    # ---- GPU: uncomment to use NVIDIA runtime (needs nvidia-container-toolkit) ----
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  models:
